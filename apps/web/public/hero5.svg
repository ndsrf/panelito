<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="100%" height="100%">
  <defs>
    <!-- Fondo y Degradados Oscuros -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#010204" />
      <stop offset="50%" stop-color="#040509" />
      <stop offset="100%" stop-color="#020205" />
    </linearGradient>
    
    <!-- Filtros de Resplandor (Glow Effect) -->
    <filter id="glow-heavy" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-subtle" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Lienzo de Fondo -->
  <rect width="1200" height="750" fill="url(#bg-grad)" />
  <circle cx="600" cy="200" r="180" fill="#7c3aed" opacity="0.06" filter="url(#glow-heavy)" />

  <!-- CONTENEDOR DISPOSITIVO PRINCIPAL (Mockup de la App) -->
  <g transform="translate(150, 75)">
    <!-- Marco de la Pantalla -->
    <rect width="900" height="600" rx="16" fill="#040508" stroke="#111520" stroke-width="2" />
    
    <!-- BARRA SUPERIOR DE LA VENTANA -->
    <rect width="900" height="40" rx="16" fill="#070a0f" />
    <!-- Botones de Sistema -->
    <circle cx="25" cy="20" r="5" fill="#ef4444" opacity="0.6"/>
    <circle cx="41" cy="20" r="5" fill="#f59e0b" opacity="0.6"/>
    <circle cx="57" cy="20" r="5" fill="#10b981" opacity="0.6"/>
    <!-- URL de la sala -->
    <rect width="180" height="16" rx="4" fill="#0f141c" x="360" y="12"/>
    <text x="391" y="24" fill="#475569" font-family="sans-serif" font-size="10" letter-spacing="1">multiverse.io/room/pan-euro-map</text>

    <!-- ==================== PANEL ANALÍTICO SUPERIOR (40%): MAPA EUROPA FULL ==================== -->
    <g transform="translate(20, 55)">
      <!-- Marco del Canvas Superior -->
      <rect width="860" height="210" rx="8" fill="#060912" stroke="#4c1d95" stroke-width="1" />
      <text x="20" y="25" fill="#ca8a04" font-family="sans-serif" font-size="11" font-weight="bold" letter-spacing="1">MÓDULO DE MACROSIMULACIÓN: MAPA DE RED LOGÍSTICA CONTINENTAL</text>
      
      <!-- CONTENEDOR ÚNICO: MAPA DE EUROPA EN PANTALLA COMPLETA -->
      <g transform="translate(20, 45)">
        <rect width="820" height="145" rx="6" fill="#090f1c" stroke="#1e293b" stroke-width="1"/>
        
        <!-- Líneas de cuadrícula táctica global -->
        <line x1="0" y1="35" x2="820" y2="35" stroke="#121b2d" stroke-width="1" stroke-dasharray="5 5"/>
        <line x1="0" y1="75" x2="820" y2="75" stroke="#121b2d" stroke-width="1" stroke-dasharray="5 5"/>
        <line x1="0" y1="110" x2="820" y2="110" stroke="#121b2d" stroke-width="1" stroke-dasharray="5 5"/>
        <line x1="205" y1="0" x2="205" y2="145" stroke="#121b2d" stroke-width="1" stroke-dasharray="5 5"/>
        <line x1="410" y1="0" x2="410" y2="145" stroke="#121b2d" stroke-width="1" stroke-dasharray="5 5"/>
        <line x1="615" y1="0" x2="615" y2="145" stroke="#121b2d" stroke-width="1" stroke-dasharray="5 5"/>

        <!-- Trazado Vectorial Escalado de la Geografía Europea -->
        <!-- Silueta Continental e Islas Estilizadas -->
        <!-- Península Ibérica -->
        <path d="M 120,130 L 170,130 L 190,100 L 180,85 L 140,85 Z" fill="#131e33" stroke="#223354" stroke-width="1.5"/>
        <!-- Francia y Centro Europa -->
        <path d="M 190,100 L 220,70 L 260,85 L 290,120 L 310,135 M 250,85 L 340,75 L 390,105 L 430,125" fill="none" stroke="#223354" stroke-width="1.5"/>
        <!-- Italia -->
        <path d="M 290,120 L 310,135 L 330,140 L 315,115 Z" fill="#131e33" stroke="#223354" stroke-width="1.5"/>
        <!-- Escandinavia / Países Nórdicos -->
        <path d="M 280,45 L 310,15 L 370,10 L 360,55 L 320,65 L 300,50" fill="#131e33" stroke="#223354" stroke-width="1.5"/>
        <!-- Reino Unido e Irlanda -->
        <path d="M 195,55 L 215,35 L 230,50 L 210,70 Z" fill="#131e33" stroke="#223354" stroke-width="1"/>
        <path d="M 170,55 L 185,45 L 185,60 Z" fill="#131e33" stroke="#223354" stroke-width="1"/>
        <!-- Europa del Este / Masa Continental Derecha -->
        <path d="M 340,75 L 480,40 L 650,30 L 720,60 L 680,130 L 510,140 L 430,125" fill="#131e33" stroke="#223354" stroke-width="1.5"/>
        <!-- Grecia / Balcanes -->
        <path d="M 390,105 L 415,135 L 430,125 L 410,110 Z" fill="#131e33" stroke="#223354" stroke-width="1.5"/>

        <!-- RED DE NODOS MULTIVERSO (Flujos de Datos Interconectados) -->
        <!-- Líneas Troncales de Conexión Primaria (Neon Cyan de la Rama Activa) -->
        <path d="M 150,110 L 215,55 L 245,80 L 330,55 L 460,65 L 600,45" fill="none" stroke="#00f2fe" stroke-width="2.5" filter="url(#glow-subtle)"/>
        
        <!-- Líneas de Distribución Secundarias (Morado / Esmeralda) -->
        <line x1="245" y1="80" x2="305" y2="120" stroke="#7c3aed" stroke-width="1.5"/>
        <line x1="330" y1="55" x2="305" y2="120" stroke="#7c3aed" stroke-width="1.5"/>
        <line x1="330" y1="55" x2="415" y2="115" stroke="#10b981" stroke-width="1.5" stroke-dasharray="3 2"/>
        <line x1="460" y1="65" x2="415" y2="115" stroke="#10b981" stroke-width="1.5"/>
        <line x1="460" y1="65" x2="520" y2="110" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4 4"/>

        <!-- Balizas Luminosas / Capitales Analizadas -->
        <circle cx="150" cy="110" r="4" fill="#00f2fe"/> <!-- Madrid -->
        <circle cx="215" cy="55" r="4" fill="#00f2fe"/>  <!-- Londres -->
        <circle cx="245" cy="80" r="6" fill="#00f2fe" filter="url(#glow-subtle)"/> <!-- París (Nodo Core) -->
        <circle cx="330" cy="55" r="5" fill="#00f2fe" filter="url(#glow-subtle)"/> <!-- Berlín -->
        <circle cx="305" cy="120" r="4" fill="#7c3aed"/> <!-- Roma -->
        <circle cx="460" cy="65" r="5" fill="#34d399"/>  <!-- Varsovia -->
        <circle cx="415" cy="115" r="4" fill="#10b981"/> <!-- Atenas -->
        <circle cx="520" cy="110" r="4" fill="#7c3aed"/> <!-- Bucarest -->
        <circle cx="600" cy="45" r="4" fill="#00f2fe"/>  <!-- Moscú Reg. -->

        <!-- Etiquetas de Estado Flotantes en el Mapa -->
        <rect width="85" height="16" rx="3" fill="#0f172a" stroke="#00f2fe" stroke-width="1" x="258" y="70" opacity="0.9"/>
        <text x="264" y="81" fill="#00f2fe" font-family="sans-serif" font-size="8" font-weight="bold">París: Hub Activo</text>

        <rect width="95" height="16" rx="3" fill="#0f172a" stroke="#10b981" stroke-width="1" x="470" y="57" opacity="0.9"/>
        <text x="475" y="68" fill="#10b981" font-family="sans-serif" font-size="8">Varsovia: Estable</text>
      </g>
    </g>

    <!-- ==================== BARRA DIVISORIA / NAVEGADOR DE RAMAS ==================== -->
    <g transform="translate(20, 278)">
      <rect width="860" height="34" rx="6" fill="#0d0e16" stroke="#1e1b4b" stroke-width="1"/>
      <g transform="translate(15, 7)">
        <rect width="135" height="20" rx="4" fill="#024e6b" stroke="#00f2fe" stroke-width="1" filter="url(#glow-subtle)"/>
        <circle cx="12" cy="10" r="4" fill="#00f2fe"/>
        <text x="24" y="14" fill="#ffffff" font-family="sans-serif" font-size="10" font-weight="bold">Simulación Global</text>
      </g>
      <text x="705" y="21" fill="#475569" font-family="sans-serif" font-size="10" font-style="italic">Mapeando flujos masivos...</text>
    </g>

    <!-- ==================== FLUJO DE CHAT INFERIOR ==================== -->
    <g transform="translate(20, 325)">
      <rect width="860" height="255" rx="8" fill="#04060a" stroke="#11111f" stroke-width="1"/>
      
      <!-- Mensaje de Bot Operador Geográfico -->
      <g transform="translate(20, 25)">
        <circle cx="20" cy="20" r="14" fill="#13102b" stroke="#7c3aed" stroke-width="1"/>
        <text x="15" y="23" fill="#7c3aed" font-family="sans-serif" font-size="10" font-weight="bold">🗺️</text>
        <text x="45" y="14" fill="#7c3aed" font-family="sans-serif" font-size="10" font-weight="bold" letter-spacing="0.5">GEO_BOT: CORE CONTINENTAL</text>
        
        <rect x="45" y="22" width="700" height="65" rx="6" fill="#0a0915" stroke="#4c1d95" stroke-width="1"/>
        <text x="57" y="42" fill="#f1f5f9" font-family="sans-serif" font-size="11" font-weight="500">He sincronizado la matriz de datos a escala continental. He expandido el mapa de operaciones al 100%.</text>
        <text x="57" y="62" fill="#94a3b8" font-family="sans-serif" font-size="11">Mapeando vectores de distribución simultáneos e interconexiones clave entre todas las ramas activas de la mesa.</text>
      </g>

      <!-- Caja de texto de entrada -->
      <g transform="translate(20, 210)">
        <rect width="820" height="32" rx="6" fill="#090d16" stroke="#1e293b" stroke-width="1"/>
        <text x="15" y="20" fill="#475569" font-family="sans-serif" font-size="11">Inserta un nuevo nodo geográfico o expande la red con @geo...</text>
      </g>
    </g>
  </g>
</svg>
