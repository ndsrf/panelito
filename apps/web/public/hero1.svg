<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020204" />
      <stop offset="50%" stop-color="#06060b" />
      <stop offset="100%" stop-color="#030305" />
    </linearGradient>
    <linearGradient id="indigo-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="1" />
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.3" />
    </linearGradient>
    <filter id="glow-heavy" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-subtle" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="1200" height="750" fill="url(#bg-grad)" />
  <circle cx="900" cy="200" r="180" fill="#4f46e5" opacity="0.12" filter="url(#glow-heavy)" />

  <!-- Mockup de la App -->
  <g transform="translate(150, 75)">
    <!-- Marco -->
    <rect width="900" height="600" rx="16" fill="#050508" stroke="#14141f" stroke-width="2" />
    
    <!-- BARRA SUPERIOR -->
    <rect width="900" height="40" rx="16" fill="#09090f" />
    <circle cx="25" cy="20" r="5" fill="#ef4444" opacity="0.6"/>
    <circle cx="41" cy="20" r="5" fill="#f59e0b" opacity="0.6"/>
    <circle cx="57" cy="20" r="5" fill="#10b981" opacity="0.6"/>
    <rect width="180" height="16" rx="4" fill="#141423" x="360" y="12"/>
    <text x="402" y="24" fill="#475569" font-family="sans-serif" font-size="10" letter-spacing="1">multiverse.io/room/grow-workshop</text>

    <!-- ==================== PANEL SUPERIOR: MATRIZ GROW (40%) ==================== -->
    <g transform="translate(20, 55)">
      <rect width="860" height="210" rx="8" fill="#0b0b12" stroke="#312e81" stroke-width="1" />
      <text x="20" y="25" fill="#818cf8" font-family="sans-serif" font-size="11" font-weight="bold" letter-spacing="1">MÉTODO GROW: TALLER DE ALINEACIÓN ESTRATÉGICA</text>
      
      <!-- Cuadrantes G, R, O (Estados Completados/Bloqueados en Miniatura) -->
      <g transform="translate(20, 45)">
        <!-- G - Goal -->
        <rect width="130" height="45" rx="4" fill="#111122" stroke="#1e1b4b" stroke-width="1"/>
        <text x="10" y="18" fill="#475569" font-family="sans-serif" font-size="9" font-weight="bold">G • GOAL</text>
        <text x="10" y="32" fill="#94a3b8" font-family="sans-serif" font-size="10" font-weight="600">Lanzar MVP Q3</text>
        
        <!-- R - Reality -->
        <rect width="130" height="45" rx="4" fill="#111122" stroke="#1e1b4b" stroke-width="1" x="145"/>
        <text x="155" y="18" fill="#475569" font-family="sans-serif" font-size="9" font-weight="bold">R • REALITY</text>
        <text x="155" y="32" fill="#94a3b8" font-family="sans-serif" font-size="10" font-weight="600">Deuda Técnica Alta</text>

        <!-- O - Options -->
        <rect width="130" height="45" rx="4" fill="#111122" stroke="#1e1b4b" stroke-width="1" x="290"/>
        <text x="300" y="18" fill="#475569" font-family="sans-serif" font-size="9" font-weight="bold">O • OPTIONS</text>
        <text x="300" y="32" fill="#38bdf8" font-family="sans-serif" font-size="10" font-weight="600">Ruta Desacoplada</text>
      </g>

      <!-- Cuadrante W Activo: El Plan de Acción / Kanban (Derecha Ampliada) -->
      <g transform="translate(465, 45)">
        <rect width="375" height="145" rx="6" fill="#131325" stroke="#4338ca" stroke-width="1" filter="url(#glow-subtle)"/>
        <rect width="375" height="24" rx="4" fill="#1e1b4b" />
        <text x="12" y="16" fill="#ca8a04" font-family="sans-serif" font-size="10" font-weight="bold" letter-spacing="0.5">💥 EN CURSO: W • WILL (COMPROMISO ACCIONABLE)</text>
        
        <!-- Columnas del Mini-Kanban Ejecutivo -->
        <g transform="translate(12, 35)">
          <!-- Acción 1 -->
          <rect width="350" height="32" rx="4" fill="#1a1a3a" stroke="#2e2a72" stroke-width="1"/>
          <text x="10" y="20" fill="#f8fafc" font-family="sans-serif" font-size="10" font-weight="600">Refactorizar Core de Persistencia</text>
          <rect width="45" height="14" rx="3" fill="#38bdf8" x="240" y="9"/>
          <text x="246" y="19" fill="#0c4a6e" font-family="sans-serif" font-size="8" font-weight="bold">Carlos</text>
          <text x="300" y="20" fill="#64748b" font-family="sans-serif" font-size="9">24 Jun</text>

          <!-- Acción 2 -->
          <rect width="350" height="32" rx="4" fill="#1a1a3a" stroke="#2e2a72" stroke-width="1" y="40"/>
          <text x="10" y="60" fill="#f8fafc" font-family="sans-serif" font-size="10" font-weight="600">Sincronizar Webhooks Supabase</text>
          <rect width="45" height="14" rx="3" fill="#34d399" x="240" y="49"/>
          <text x="251" y="59" fill="#064e3b" font-family="sans-serif" font-size="8" font-weight="bold">Lau</text>
          <text x="300" y="60" fill="#64748b" font-family="sans-serif" font-size="9">28 Jun</text>
        </g>
      </g>
    </g>

    <!-- ==================== NAVEGADOR DE RAMAS ==================== -->
    <g transform="translate(20, 278)">
      <rect width="860" height="34" rx="6" fill="#0d0e16" stroke="#1e1b4b" stroke-width="1"/>
      <g transform="translate(15, 7)">
        <rect width="120" height="20" rx="4" fill="#1e1b4b"/>
        <circle cx="12" cy="10" r="4" fill="#ca8a04"/>
        <text x="24" y="14" fill="#f59e0b" font-family="sans-serif" font-size="10" font-weight="bold">Camino de Voluntad</text>
      </g>
      <text x="710" y="21" fill="#475569" font-family="sans-serif" font-size="10" font-style="italic">Diseñando entregables...</text>
    </g>

    <!-- ==================== CHAT INFERIOR ==================== -->
    <g transform="translate(20, 325)">
      <rect width="860" height="255" rx="8" fill="#06060b" stroke="#11111f" stroke-width="1"/>
      
      <!-- Mensaje de Bot Agile Coach -->
      <g transform="translate(20, 25)">
        <circle cx="20" cy="20" r="14" fill="#1e1b4b" stroke="#818cf8" stroke-width="1"/>
        <text x="16" y="23" fill="#818cf8" font-family="sans-serif" font-size="10" font-weight="bold">⚙️</text>
        <text x="45" y="14" fill="#818cf8" font-family="sans-serif" font-size="10" font-weight="bold" letter-spacing="0.5">COACH_BOT: FACILITADOR AGIL</text>
        
        <rect x="45" y="22" width="700" height="65" rx="6" fill="#0a0a16" stroke="#312e81" stroke-width="1"/>
        <text x="57" y="42" fill="#f1f5f9" font-family="sans-serif" font-size="11" font-weight="500">Perfecto. Hemos consolidado las Opciones de la rama de arquitectura. Pasamos a la Fase W.</text>
        <text x="57" y="62" fill="#94a3b8" font-family="sans-serif" font-size="11">He mapeado vuestros compromisos directos arriba en el tablero Kanban. Confirmad responsables.</text>
      </g>

      <!-- Caja de texto -->
      <g transform="translate(20, 210)">
        <rect width="820" height="32" rx="6" fill="#0f0f18" stroke="#1e1b4b" stroke-width="1"/>
        <text x="15" y="20" fill="#475569" font-family="sans-serif" font-size="11">Asigna una tarea o cierra el taller con @coach...</text>
      </g>
    </g>
  </g>
</svg>
