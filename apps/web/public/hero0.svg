<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="100%" height="100%">
  <defs>
    <!-- Fondo y Degradados Oscuros -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#010204" />
      <stop offset="50%" stop-color="#040509" />
      <stop offset="100%" stop-color="#020205" />
    </linearGradient>
    
    <!-- Filtros de Resplandor (Glow Effect) -->
    <filter id="glow-heavy" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-subtle" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Lienzo de Fondo -->
  <rect width="1200" height="750" fill="url(#bg-grad)" />
  <circle cx="1050" cy="400" r="180" fill="#6366f1" opacity="0.1" filter="url(#glow-heavy)" />

  <!-- CONTENEDOR DISPOSITIVO PRINCIPAL (Mockup de la App) -->
  <g transform="translate(150, 75)">
    <!-- Marco de la Pantalla -->
    <rect width="900" height="600" rx="16" fill="#040508" stroke="#111520" stroke-width="2" />
    
    <!-- BARRA SUPERIOR DE LA VENTANA -->
    <rect width="900" height="40" rx="16" fill="#070a0f" />
    <!-- Botones de Sistema Mac-style -->
    <circle cx="25" cy="20" r="5" fill="#ef4444" opacity="0.6"/>
    <circle cx="41" cy="20" r="5" fill="#f59e0b" opacity="0.6"/>
    <circle cx="57" cy="20" r="5" fill="#10b981" opacity="0.6"/>
    <!-- URL de la sala -->
    <rect width="180" height="16" rx="4" fill="#0f141c" x="360" y="12"/>
    <text x="390" y="24" fill="#475569" font-family="sans-serif" font-size="10" letter-spacing="1">multiverse.io/room/agent-library</text>

    <!-- ==================== BLOQUE IZQUIERDO: COMPRIMIDO (W: 580px) ==================== -->
    
    <!-- 1. Panel Analítico Superior (40%) -->
    <g transform="translate(20, 55)">
      <rect width="580" height="210" rx="8" fill="#060911" stroke="#1e1b4b" stroke-width="1" />
      <text x="15" y="22" fill="#4f46e5" font-family="sans-serif" font-size="10" font-weight="bold" letter-spacing="0.5">PANEL DE CONTROL COMPRIMIDO</text>
      
      <!-- Mini Gráfico Bento / Métricas de Consenso -->
      <g transform="translate(15, 40)">
        <rect width="265" height="145" rx="6" fill="#0c0e1a" stroke="#2e2a72" stroke-width="1"/>
        <text x="15" y="25" fill="#94a3b8" font-family="sans-serif" font-size="11">Alineación Estratégica</text>
        <text x="15" y="65" fill="#ffffff" font-family="sans-serif" font-size="32" font-weight="bold">88.4%</text>
        <path d="M 15,110 Q 80,85 140,115 T 250,90" fill="none" stroke="#6366f1" stroke-width="2" filter="url(#glow-subtle)"/>
      </g>
      
      <g transform="translate(295, 40)">
        <rect width="270" height="145" rx="6" fill="#0c0e1a" stroke="#1e293b" stroke-width="1"/>
        <text x="15" y="25" fill="#94a3b8" font-family="sans-serif" font-size="11">Riesgos No Mitigados</text>
        <text x="15" y="65" fill="#ef4444" font-family="sans-serif" font-size="32" font-weight="bold">02</text>
        <rect width="80" height="16" rx="4" fill="#7f1d1d" x="15" y="95"/>
        <text x="21" y="106" fill="#fca5a5" font-family="sans-serif" font-size="9" font-weight="bold">Alerta Red Team</text>
      </g>
    </g>

    <!-- 2. Barra Divisoria / Navegador de Ramas -->
    <g transform="translate(20, 278)">
      <rect width="580" height="34" rx="6" fill="#0d0e16" stroke="#1e1b4b" stroke-width="1"/>
      <g transform="translate(15, 7)">
        <rect width="90" height="20" rx="4" fill="#1e1b4b"/>
        <circle cx="12" cy="10" r="4" fill="#6366f1"/>
        <text x="24" y="14" fill="#e2e8f0" font-family="sans-serif" font-size="10">Rama Raíz</text>
      </g>
    </g>

    <!-- 3. Flujo de Chat Inferior (60%) -->
    <g transform="translate(20, 325)">
      <rect width="580" height="255" rx="8" fill="#04060b" stroke="#11111f" stroke-width="1"/>
      <!-- Burbuja de conversación de ejemplo -->
      <g transform="translate(15, 20)">
        <circle cx="15" cy="15" r="12" fill="#4338ca"/>
        <text x="11" y="18" fill="#fff" font-family="sans-serif" font-size="9" font-weight="bold">J</text>
        <rect x="35" y="10" width="400" height="45" rx="6" fill="#111122"/>
        <text x="47" y="26" fill="#f1f5f9" font-family="sans-serif" font-size="11">Invocando el perfil de auditoría para verificar la viabilidad</text>
        <text x="47" y="40" fill="#f1f5f9" font-family="sans-serif" font-size="11">de la propuesta financiera en la rama activa...</text>
      </g>
      
      <!-- Entrada de Texto reducida -->
      <g transform="translate(15, 210)">
        <rect width="550" height="32" rx="6" fill="#0f0f18" stroke="#1e1b4b" stroke-width="1"/>
        <text x="15" y="20" fill="#475569" font-family="sans-serif" font-size="11">Escribe un comando o selecciona un bot a la derecha...</text>
      </g>
    </g>

    <!-- ==================== BLOQUE DERECHO: LIBRERÍA DE AGENTES (W: 260px) ==================== -->
    <g transform="translate(620, 55)">
      <!-- Contenedor Principal de la Sidebar (Brillante / Focus activo) -->
      <rect width="260" height="525" rx="8" fill="#0a0c16" stroke="#4338ca" stroke-width="1.5" filter="url(#glow-subtle)"/>
      <rect width="260" height="36" rx="6" fill="#111328" />
      <text x="15" y="22" fill="#ffffff" font-family="sans-serif" font-size="11" font-weight="bold" letter-spacing="1">🤖 BIBLIOTECA DE EXPERTOS</text>
      
      <!-- CARD 1: AUDITOR DE DATOS (Estado: Activo/Invocado) -->
      <g transform="translate(12, 50)">
        <rect width="236" height="75" rx="6" fill="#11162d" stroke="#00f2fe" stroke-width="1"/>
        <circle cx="25" cy="25" r="14" fill="#0f172a" stroke="#00f2fe" stroke-width="1"/>
        <text x="21" y="28" fill="#00f2fe" font-size="10">📊</text>
        <text x="48" y="22" fill="#ffffff" font-family="sans-serif" font-size="11" font-weight="bold">AUDITOR DE DATOS</text>
        <text x="48" y="38" fill="#00f2fe" font-family="sans-serif" font-size="9" font-weight="600">[ RIGOR CLÍNICO ]</text>
        <text x="48" y="52" fill="#64748b" font-family="sans-serif" font-size="9">Filtra falacias y cuadra números.</text>
        <!-- Badge Activo -->
        <rect width="45" height="14" rx="3" fill="#00f2fe" x="180" y="12"/>
        <text x="186" y="22" fill="#004e7c" font-family="sans-serif" font-size="8" font-weight="bold">ACTIVO</text>
      </g>

      <!-- CARD 2: ABOGADO DEL DIABLO (Estado: Listo para invocar) -->
      <g transform="translate(12, 140)">
        <rect width="236" height="75" rx="6" fill="#111122" stroke="#1e1b4b" stroke-width="1"/>
        <circle cx="25" cy="25" r="14" fill="#1c1917" stroke="#dc2626" stroke-width="1"/>
        <text x="21" y="28" fill="#dc2626" font-size="10">🔥</text>
        <text x="48" y="22" fill="#f8fafc" font-family="sans-serif" font-size="11" font-weight="600">ABOGADO DEL DIABLO</text>
        <text x="48" y="38" fill="#ef4444" font-family="sans-serif" font-size="9">[ RED TEAM SIMULATOR ]</text>
        <text x="48" y="52" fill="#64748b" font-family="sans-serif" font-size="9">Relentless risk assessment.</text>
        <!-- Botón Invocar -->
        <rect width="48" height="16" rx="3" fill="#1e1b4b" stroke="#6366f1" stroke-width="1" x="177" y="12"/>
        <text x="183" y="23" fill="#ca8a04" font-family="sans-serif" font-size="8" font-weight="bold">INVOCAR</text>
      </g>

      <!-- CARD 3: AGILE COACH GROW (Estado: Listo para invocar) -->
      <g transform="translate(12, 230)">
        <rect width="236" height="75" rx="6" fill="#111122" stroke="#1e1b4b" stroke-width="1"/>
        <circle cx="25" cy="25" r="14" fill="#1e1b4b" stroke="#eab308" stroke-width="1"/>
        <text x="21" y="28" fill="#eab308" font-size="10">🎯</text>
        <text x="48" y="22" fill="#f8fafc" font-family="sans-serif" font-size="11" font-weight="600">COACH AGILE GROW</text>
        <text x="48" y="38" fill="#eab308" font-family="sans-serif" font-size="9">[ FACILITADOR WORKSHOP ]</text>
        <text x="48" y="52" fill="#64748b" font-family="sans-serif" font-size="9">Modera y genera planes de acción.</text>
        <!-- Botón Invocar -->
        <rect width="48" height="16" rx="3" fill="#1e1b4b" stroke="#6366f1" stroke-width="1" x="177" y="12"/>
        <text x="183" y="23" fill="#ca8a04" font-family="sans-serif" font-size="8" font-weight="bold">INVOCAR</text>
      </g>

      <!-- CARD 4: CLONES DE POSTURA (Estado: Bloqueado/Configurable en v2) -->
      <g transform="translate(12, 320)">
        <rect width="236" height="75" rx="6" fill="#0d0f1f" stroke="#111322" stroke-width="1" opacity="0.6"/>
        <circle cx="25" cy="25" r="14" fill="#0f172a" stroke="#475569" stroke-width="1"/>
        <text x="21" y="28" fill="#475569" font-size="10">🎭</text>
        <text x="48" y="22" fill="#94a3b8" font-family="sans-serif" font-size="11">CLONES DE POSTURA</text>
        <text x="48" y="38" fill="#64748b" font-family="sans-serif" font-size="9">[ SIMULACIÓN CULTURAL ]</text>
        <text x="48" y="52" fill="#475569" font-family="sans-serif" font-size="9">Presets políticos y de mercado.</text>
        <!-- Bloqueado Badge -->
        <text x="195" y="23" fill="#475569" font-family="sans-serif" font-size="8" font-weight="bold">[v2]</text>
      </g>

      <!-- Footer Informativo de la Sidebar -->
      <line x1="15" y1="480" x2="245" y2="480" stroke="#1e1b4b" stroke-width="1"/>
      <text x="20" y="502" fill="#475569" font-family="sans-serif" font-size="9" font-style="italic">Arrastra un experto a la mesa para iniciar.</text>
    </g>
  </g>
</svg>
 
