<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="100%" height="100%">
  <defs>
    <!-- Fondo y Degradados Oscuros -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#010103" />
      <stop offset="50%" stop-color="#040508" />
      <stop offset="100%" stop-color="#020204" />
    </linearGradient>

    <!-- Degradado para la burbuja de la IA en Streaming -->
    <linearGradient id="ai-bubble-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090e1a" />
      <stop offset="100%" stop-color="#050810" />
    </linearGradient>

    <!-- Filtros de Resplandor (Glow Effect) -->
    <filter id="glow-heavy" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-subtle" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Lienzo de Fondo -->
  <rect width="1200" height="750" fill="url(#bg-grad)" />
  <circle cx="200" cy="450" r="180" fill="#6366f1" opacity="0.08" filter="url(#glow-heavy)" />

  <!-- CONTENEDOR DISPOSITIVO PRINCIPAL (Mockup de la App) -->
  <g transform="translate(150, 75)">
    <!-- Marco de la Pantalla -->
    <rect width="900" height="600" rx="16" fill="#040507" stroke="#10141f" stroke-width="2" />

    <!-- BARRA SUPERIOR DE LA VENTANA -->
    <rect width="900" height="40" rx="16" fill="#070a0f" />
    <!-- Botones de Sistema Mac-style -->
    <circle cx="25" cy="20" r="5" fill="#ef4444" opacity="0.6"/>
    <circle cx="41" cy="20" r="5" fill="#f59e0b" opacity="0.6"/>
    <circle cx="57" cy="20" r="5" fill="#10b981" opacity="0.6"/>
    <!-- URL de la sala -->
    <rect width="180" height="16" rx="4" fill="#0f141c" x="360" y="12"/>
    <text x="397" y="24" fill="#475569" font-family="sans-serif" font-size="10" letter-spacing="1">multiverse.io/room/deep-chat</text>

    <!-- ==================== PANEL ANALÍTICO REPLEGADO (MINIMIZADO) ==================== -->
    <g transform="translate(20, 55)">
      <rect width="860" height="40" rx="6" fill="#070a12" stroke="#1e1b4b" stroke-width="1" />
      <circle cx="20" cy="20" r="4" fill="#6366f1" opacity="0.7"/>
      <text x="35" y="24" fill="#4f5e75" font-family="sans-serif" font-size="10" font-weight="bold" letter-spacing="0.5">PANEL ANALÍTICO REPLEGADO (15%) • REPRODUCIENDO MAPA DE RIESGOS EN SEGUNDO PLANO</text>
      <!-- Icono indicador de expandir -->
      <path d="M 825,16 L 830,22 L 835,16" fill="none" stroke="#475569" stroke-width="2"/>
    </g>

    <!-- ==================== BARRA DIVISORIA / NAVEGADOR DE RAMAS ==================== -->
    <g transform="translate(20, 105)">
      <rect width="860" height="34" rx="6" fill="#0d0e16" stroke="#1e1b4b" stroke-width="1"/>

      <!-- Rama Raíz -->
      <g transform="translate(15, 7)">
        <rect width="90" height="20" rx="4" fill="#1e1b4b"/>
        <circle cx="12" cy="10" r="4" fill="#6366f1"/>
        <text x="24" y="14" fill="#94a3b8" font-family="sans-serif" font-size="10">Rama Raíz</text>
      </g>

      <!-- Rama Activa Destacada (Cyan) -->
      <g transform="translate(120, 7)">
        <rect width="115" height="20" rx="4" fill="#024e6b" stroke="#00f2fe" stroke-width="1" filter="url(#glow-subtle)"/>
        <circle cx="12" cy="10" r="4" fill="#00f2fe"/>
        <text x="24" y="14" fill="#ffffff" font-family="sans-serif" font-size="10" font-weight="bold">Ruta Financiera</text>
      </g>

      <text x="735" y="21" fill="#00f2fe" font-family="sans-serif" font-size="10" font-weight="bold" filter="url(#glow-subtle)">⚡ TRANSMISIÓN EN VIVO</text>
    </g>

    <!-- ==================== SECCIÓN DE CHAT ENFOCADA (85% DEL ESPACIO) ==================== -->
    <g transform="translate(20, 150)">
      <!-- Contenedor Gigante del Chat Stream -->
      <rect width="860" height="430" rx="8" fill="#04050a" stroke="#11111f" stroke-width="1"/>

      <!-- MENSAJE 1: HUMANO (JAVI) -->
      <g transform="translate(25, 25)">
        <circle cx="20" cy="20" r="14" fill="#312e81"/>
        <text x="16" y="23" fill="#ffffff" font-family="sans-serif" font-size="10" font-weight="bold">J</text>
        <text x="48" y="14" fill="#64748b" font-family="sans-serif" font-size="10" font-weight="bold">Javi Gomez</text>

        <rect x="48" y="22" width="620" height="36" rx="6" fill="#0f0f1f"/>
        <text x="60" y="44" fill="#f1f5f9" font-family="sans-serif" font-size="11">Si incrementamos la inversión un 20%, ¿cuál es el riesgo real de perder liquidez en diciembre?</text>

        <!-- Reacción rápida aplicada -->
        <g transform="translate(680, 26)">
          <rect width="45" height="20" rx="4" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
          <text x="8" y="14" font-size="10">📌 1</text>
        </g>
      </g>

      <!-- MENSAJE 2: HUMANO (LAU) con Mención e Interacción -->
      <g transform="translate(25, 85)">
        <circle cx="20" cy="20" r="14" fill="#065f46"/>
        <text x="16" y="23" fill="#ffffff" font-family="sans-serif" font-size="10" font-weight="bold">L</text>
        <text x="48" y="14" fill="#64748b" font-family="sans-serif" font-size="10" font-weight="bold">Lau Martín</text>

        <rect x="48" y="22" width="620" height="36" rx="6" fill="#0f0f1f"/>
        <text x="60" y="44" fill="#f1f5f9" font-family="sans-serif" font-size="11"><tspan fill="#38bdf8" font-weight="bold">@analista</tspan> calcula esa proyección usando la matriz de caja de la Rama Raíz.</text>

        <!-- Power Reactions de Lau -->
        <g transform="translate(48, 64)">
          <rect width="42" height="16" rx="4" fill="#1e293b"/>
          <text x="6" y="12" font-size="9">🧠 4</text>
          <rect width="42" height="16" rx="4" fill="#7f1d1d" x="48"/>
          <text x="54" y="12" font-size="9">🔥 2</text>
        </g>
      </g>

      <!-- MENSAJE 3: IA CONTRIBUYENDO - EN PLENO STREAMING (TOKEN-BY-TOKEN) -->
      <g transform="translate(25, 165)">
        <!-- Avatar IA Neón -->
        <circle cx="20" cy="25" r="14" fill="#090d16" stroke="#00f2fe" stroke-width="1" filter="url(#glow-subtle)"/>
        <circle cx="20" cy="21" r="2" fill="#00f2fe"/>
        <circle cx="15" cy="28" r="2" fill="#00f2fe"/>
        <circle cx="25" cy="28" r="2" fill="#00f2fe"/>
        <line x1="20" y1="21" x2="15" y2="28" stroke="#00f2fe" stroke-width="1"/>
        <line x1="20" y1="21" x2="25" y2="28" stroke="#00f2fe" stroke-width="1"/>

        <text x="48" y="14" fill="#00f2fe" font-family="sans-serif" font-size="10" font-weight="bold" letter-spacing="0.5">MUTA_BOT: ANALISTA CIENTÍFICO</text>

        <!-- Burbuja con Borde de Carga de Streaming Neón -->
        <rect x="48" y="24" width="760" height="90" rx="6" fill="url(#ai-bubble-grad)" stroke="#005b8c" stroke-width="1"/>

        <text x="60" y="46" fill="#f1f5f9" font-family="sans-serif" font-size="11" font-weight="500">Procesando vectores financieros... Con el incremento del 20%, la reserva cae a 14K€ en Noviembre.</text>
        <!-- Texto que simula estar escribiéndose en ese milisegundo -->
        <text x="60" y="66" fill="#ffffff" font-family="sans-serif" font-size="11" font-weight="bold">Riesgo de insolvencia latente: <tspan fill="#ef4444">ALTO (74%)</tspan>. Generando mutación en el canvas</text>

        <!-- Cursor de Streaming Activo (Flasheador) -->
        <rect x="450" y="55" width="6" height="12" fill="#00f2fe" filter="url(#glow-subtle)"/>

        <!-- Canal Secundario: Indicador de Mutación Estructural del Panel en Vivo -->
        <rect width="320" height="16" rx="4" fill="#0c1928" x="60" y="84" stroke="#004e7c" stroke-width="0.5"/>
        <text x="68" y="95" fill="#38bdf8" font-family="sans-serif" font-size="8" font-weight="bold">⚙️ UI_MUTATION_BLOCK: INYECTANDOsnap_PROJECTION_MATRIX EN PANEL SUPERIOR</text>
      </g>

      <!-- MENSAJE 4: HUMANO (CARLOS) REACCIONANDO CON INSTENSIFY -->
      <g transform="translate(25, 285)">
        <circle cx="20" cy="20" r="14" fill="#7c2d12"/>
        <text x="16" y="23" fill="#ffffff" font-family="sans-serif" font-size="10" font-weight="bold">C</text>
        <text x="48" y="14" fill="#64748b" font-family="sans-serif" font-size="10" font-weight="bold">Carlos Ortiz</text>

        <rect x="48" y="22" width="620" height="36" rx="6" fill="#0f0f1f"/>
        <text x="60" y="44" fill="#f1f5f9" font-family="sans-serif" font-size="11">Ese 74% nos mata. ¡Duplica la rama y busca alternativas de mitigación de coste ya!</text>

        <!-- Popover de Reacciones Flotante que se abre al pasar el dedo (LAYOUT-06) -->
        <g transform="translate(48, 64)">
          <rect width="180" height="22" rx="11" fill="#090d16" stroke="#4338ca" stroke-width="1" filter="url(#glow-subtle)"/>
          <text x="12" y="15" font-size="11" cursor="pointer">🧠</text>
          <!-- Botón Intensificar Activado por Carlos resplandeciendo -->
          <circle cx="48" cy="11" r="9" fill="#7f1d1d" stroke="#ef4444" stroke-width="0.5"/>
          <text x="43" y="15" font-size="11" cursor="pointer">🔥</text>
          <text x="74" y="15" font-size="11" cursor="pointer">📌</text>
          <text x="105" y="15" font-size="11" cursor="pointer">🎯</text>
          <line x1="130" y1="4" x2="130" y2="18" stroke="#1e293b"/>
          <text x="138" y="14" fill="#6366f1" font-family="sans-serif" font-size="8" font-weight="bold">FORK 🔀</text>
        </g>
      </g>

      <!-- BARRA DE ESCRITURA INFERIOR DE LA SALA (SOFT-LOCK POR STREAMING ACTIVO) -->
      <g transform="translate(20, 375)">
        <!-- El Input Box está bloqueado visualmente porque la IA está transmitiendo tokens -->
        <rect width="820" height="36" rx="6" fill="#090910" stroke="#1e1b4b" stroke-width="1"/>
        <!-- Indicador visual de Soft-Lock -->
        <circle cx="20" cy="18" r="4" fill="#00f2fe" filter="url(#glow-subtle)"/>
        <text x="35" y="22" fill="#475569" font-family="sans-serif" font-size="11" font-style="italic">Entrada deshabilitada temporalmente mientras el Analista responde (Sincronizando mesa...)</text>

        <!-- Icono de carga/bucle a la derecha -->
        <path d="M 795,13 A 5 5 0 1 1 790,18" fill="none" stroke="#00f2fe" stroke-width="1.5" stroke-linecap="round"/>
      </g>
    </g>
  </g>
</svg>
